services:
  - type: web
    name: notepad
    runtime: node
    buildCommand: npm run install:all && npm run build
    startCommand: npm start
    envVars:
      - key: TURSO_URL
        sync: false
      - key: TURSO_TOKEN
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
